<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minutes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕐</text></svg>" />
  <script type="module" crossorigin src="/assets/index-BvGmIV0Y.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DhFic1KJ.css">
</head>
<body>
  <canvas id="faceCanvas"></canvas>

  <div id="controlsWrap">
    <button id="toggleSidebarBtn" title="Toggle panel">‹</button>
  <aside id="controls">
    <h2>Face Controls</h2>

    <div class="control-group">
      <button class="btn-primary full" id="introBtn">Intro</button>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label for="mouthSlider">Mouth</label>
      <input type="range" id="mouthSlider" min="0" max="1" step="0.01" value="0" />
      <div class="btn-row">
        <button class="btn-primary" id="openMouthBtn">Open</button>
        <button class="btn-ghost" id="closeMouthBtn">Close</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Eyes</label>
      <button class="btn-primary full" id="blinkBtn">Blink</button>
      <label class="toggle-row">
        <input type="checkbox" id="autoBlinkCheckbox" checked />
        <span class="toggle-label">Auto Blink</span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Timer</label>
      <div class="btn-row">
        <button class="btn-primary" id="timerStartBtn">▶ 60s</button>
        <button class="btn-ghost"   id="timerPauseBtn" style="display:none">⏸ Pause</button>
        <button class="btn-ghost"   id="timerStopBtn"  style="display:none">■ Stop</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Look Left / Right</label>
      <input type="range" id="lookXSlider" min="-1" max="1" step="0.01" value="0" />
      <label>Look Up / Down</label>
      <input type="range" id="lookYSlider" min="-1" max="1" step="0.01" value="0" />
      <label class="toggle-row" style="margin-top:4px">
        <input type="checkbox" id="autoLookCheckbox" checked />
        <span class="toggle-label">Auto Look</span>
      </label>
    </div>
  </aside>
  </div>

  <!-- Intro overlay -->
  <div id="introOverlay" class="intro-overlay hidden">
    <svg id="introLogo" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  </div>

  <!-- API key / session modal -->
  <div id="apiModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Start Talking</h3>
      <p>Click the nose to connect. Click again to stop.</p>

      <label class="field-label">OpenAI API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false" />

      <label class="field-label">Voice</label>
      <select id="voiceSelect">
        <option value="alloy">Alloy</option>
        <option value="ash">Ash</option>
        <option value="coral" selected>Coral</option>
        <option value="echo">Echo</option>
        <option value="sage">Sage</option>
        <option value="shimmer">Shimmer</option>
        <option value="verse">Verse</option>
      </select>

      <label class="field-label">System Prompt</label>
      <textarea id="systemPrompt" rows="3" placeholder="You are a friendly assistant…">You are Tempo, a cheerful chess timer who has learned all the secrets of chess by watching countless games tick by. You love teaching chess — openings, tactics, strategy, all of it — with wit, warmth, and the occasional clock pun. Keep answers short, fun, and encouraging. If someone seems confused, be patient and playful. You live for the game!</textarea>

      <div id="modalError" class="modal-error hidden"></div>
      <div class="modal-btns">
        <button id="modalConnectBtn" class="btn-primary">Connect</button>
        <button id="modalCancelBtn"  class="btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Live session indicator -->
  <div id="sessionBadge" class="session-badge hidden">
    <span class="live-dot"></span>
    <span id="badgeLabel">Connecting…</span>
    <button id="badgeEndBtn" title="End session">✕</button>
  </div>

</body>
</html>
